spring.application.name=TradeSim
server.port=8080

# MySQL — update username/password for your local instance
spring.datasource.url=jdbc:mysql://localhost:3306/tradesim?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password="your-password"
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Alpha Vantage — set ALPHAVANTAGE_API_KEY env var or replace demo below
app.alpha-vantage.api-key=API_KEY
app.alpha-vantage.base-url=https://www.alphavantage.co/query

# Pagination limits exposed to the Angular dashboard
app.pagination.max-page-size=50
app.pagination.default-page-size=10
app.pagination.max-dummy-orders=25

app.default-symbols=IBM,MSFT,AAPL,GOOGL,TSLA

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
